<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VerificaOeste - Histórico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0"><i class="fas fa-clock-rotate-left me-2"></i>Histórico de Pesquisas</h4>
        <div class="text-muted small">Consultas salvas no servidor (rotas autenticadas).</div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-sm btn-outline-secondary" href="/">Voltar</a>
        <button class="btn btn-sm btn-outline-danger" id="btn-logout" type="button">Sair</button>
      </div>
    </div>

    <div class="card glass-card mb-3">
      <div class="card-body">
        <form id="filterForm" class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Buscar (texto/link/veredito)</label>
            <input class="form-control" name="q" placeholder="Ex.: cascavel, verdadeira..." />
          </div>
          <div class="col-md-3">
            <label class="form-label">Modo</label>
            <select class="form-select" name="modo">
              <option value="">Todos</option>
              <option value="texto">Texto</option>
              <option value="link">Link</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Veredito</label>
            <input class="form-control" name="veredito" placeholder="Ex.: FALSA, VERDADEIRA..." />
          </div>
          <div class="col-md-2 d-grid">
            <button class="btn btn-verify text-white" type="submit"><i class="fas fa-filter me-2"></i>Filtrar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="alert" class="alert d-none" role="alert"></div>

    <div class="card glass-card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="mb-0"><i class="fas fa-database me-2"></i>Itens</h6>
          <div class="text-muted small" id="meta"></div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>Quando</th>
                <th>Modo</th>
                <th>Entrada</th>
                <th>Veredito</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
          <button class="btn btn-outline-secondary" id="btn-prev">Anterior</button>
          <div class="text-muted" id="pager">Página 1</div>
          <button class="btn btn-outline-secondary" id="btn-next">Próxima</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/history.js"></script>
</body>

</html>
