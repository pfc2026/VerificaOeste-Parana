<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VerificaOeste - Conta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <div class="card glass-card">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h4 class="mb-0"><i class="fas fa-user me-2"></i>Conta</h4>
              <div>
                <a class="btn btn-sm btn-outline-secondary" href="/">Voltar</a>
              </div>
            </div>

            <div class="tabs mb-4">
            <div class="d-flex gap-2">
                <button class="btn btn-primary flex-fill" id="tab-login" type="button">Login</button>
                <button class="btn btn-outline-primary flex-fill" id="tab-register" type="button">Criar conta</button>
              </div>

            </div>

            <!-- CONTa (auto) -->
            <div id="conta-box" class="d-none">
              <h5 class="mb-3">Conta</h5>
              <div class="mb-2">
                <div class="text-muted small">Nome</div>
                <div id="conta-nome" class="fw-semibold">-</div>
              </div>
              <div class="mb-2">
                <div class="text-muted small">Email</div>
                <div id="conta-email" class="fw-semibold">-</div>
              </div>
              <div class="mb-3">
                <div class="text-muted small">Tipo</div>
                <div id="conta-tipo" class="fw-semibold">-</div>
              </div>
              <div class="alert alert-success mb-0" role="alert">
                Você está logado.
              </div>
            </div>

            <!-- LOGIN -->
            <form id="form-login" class="needs-validation" novalidate>
              <h5 class="mb-3">Login</h5>


              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" autocomplete="email" required>
                <div class="invalid-feedback">Informe um email válido.</div>
              </div>

              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control" name="senha" autocomplete="current-password" required minlength="1">
                <div class="invalid-feedback">Informe a senha.</div>
              </div>

              <button class="btn btn-verify w-100 text-white" type="submit">
                <i class="fas fa-right-to-bracket me-2"></i>Entrar
              </button>

              <div class="alert mt-3 d-none" id="login-alert" role="alert"></div>
            </form>

            <!-- REGISTER -->
            <form id="form-register" class="needs-validation d-none" novalidate>
              <h5 class="mb-3">Criar conta</h5>

              <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" name="nome" autocomplete="name" required minlength="2" maxlength="120">
                <div class="invalid-feedback">Informe seu nome.</div>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" autocomplete="email" required>
                <div class="invalid-feedback">Informe um email válido.</div>
              </div>

              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control" name="senha" autocomplete="new-password" required minlength="6" maxlength="200">
                <div class="invalid-feedback">A senha deve ter no mínimo 6 caracteres.</div>
              </div>

              <div class="mb-3">
                <label class="form-label">CPF (opcional)</label>
                <input type="text" class="form-control" name="cpf" autocomplete="off">
              </div>

              <button class="btn btn-verify w-100 text-white" type="submit">
                <i class="fas fa-user-plus me-2"></i>Criar conta
              </button>

              <div class="alert mt-3 d-none" id="register-alert" role="alert"></div>
            </form>

            <hr class="my-4" />
            <div class="text-muted small">
              <b>Obs.:</b> Após logar, você poderá ver o histórico de pesquisas.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
